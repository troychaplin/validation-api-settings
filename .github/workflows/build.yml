name: Build Test

on:
    pull_request:
        branches: [main]

jobs:
    build:
        name: Install dependencies and test build
        timeout-minutes: 10
        runs-on: 'ubuntu-latest'

        env:
            CI_JOB_NUMBER: 1

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.33.0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'
                  cache: 'pnpm'

            - name: 📦 Install
              run: pnpm install

            - name: 🔧 Build
              run: pnpm build
